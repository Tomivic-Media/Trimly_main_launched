<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trimly | Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css?v=20260402h" />
  </head>
  <body data-page="reset-password">
    <header class="site-header">
      <div class="container nav-shell">
        <a class="brand" href="./index.html">
          <span class="brand-badge">T</span>
          <span>Trimly</span>
        </a>
        <button class="nav-toggle" data-nav-toggle aria-label="Toggle menu">Menu</button>
        <nav class="nav-main" data-nav-menu>
          <div class="nav-links">
            <a href="./index.html">Home</a>
            <a href="./login.html">Login</a>
          </div>
          <div class="auth-actions" data-auth-actions>
            <a class="btn btn-ghost" href="./login.html">Login</a>
            <a class="btn btn-primary" href="./register.html">Register</a>
            <a class="auth-admin-link" href="./admin-login.html">Admin Login</a>
          </div>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container form-shell reset-shell">
        <div class="form-card reset-card">
          <h1 class="section-title">Reset Password</h1>
          <p id="resetSubtitle" class="section-subtitle">
            Enter your email address and we will send you a secure reset link.
          </p>

          <form id="resetRequestForm" class="form-grid" method="post" onsubmit="event.preventDefault();">
            <div>
              <label for="resetEmail">Email</label>
              <input id="resetEmail" name="email" class="input" type="email" required />
            </div>
            <button class="btn btn-primary" type="submit">Send Reset Link</button>
          </form>

          <form id="resetPasswordForm" class="form-grid hidden" method="post" onsubmit="event.preventDefault();">
            <input id="resetToken" name="token" type="hidden" />
            <div>
              <label for="resetNewPassword">New Password</label>
              <div class="input-with-action">
                <input id="resetNewPassword" name="new_password" class="input" type="password" required />
                <button
                  class="password-toggle"
                  type="button"
                  data-password-toggle="resetNewPassword"
                  onclick="return window.trimlyTogglePasswordInline?.('resetNewPassword', this);"
                  aria-label="Show password"
                >
                  Show
                </button>
              </div>
            </div>
            <div>
              <label for="resetConfirmPassword">Confirm Password</label>
              <div class="input-with-action">
                <input id="resetConfirmPassword" name="confirm_password" class="input" type="password" required />
                <button
                  class="password-toggle"
                  type="button"
                  data-password-toggle="resetConfirmPassword"
                  onclick="return window.trimlyTogglePasswordInline?.('resetConfirmPassword', this);"
                  aria-label="Show password"
                >
                  Show
                </button>
              </div>
            </div>
            <button class="btn btn-primary" type="submit">Reset Password</button>
          </form>

          <p id="resetNotice" class="notice"></p>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-row">
        <span>&copy; <span data-current-year></span> Trimly</span>
        <span>Password recovery for customers and barbers</span>
      </div>
    </footer>

    <div id="toast" class="toast"></div>
    <script>
      if (!window.trimlyTogglePasswordInline) {
        window.trimlyTogglePasswordInline = function (targetId, button) {
          const input = targetId ? document.getElementById(targetId) : null;
          if (!input || !button) return false;
          const nextType = input.type === "password" ? "text" : "password";
          input.type = nextType;
          button.dataset.visible = nextType !== "password" ? "true" : "false";
          button.setAttribute("aria-label", nextType === "password" ? "Show password" : "Hide password");
          button.setAttribute("title", nextType === "password" ? "Show password" : "Hide password");
          button.textContent = nextType === "password" ? "Show" : "Hide";
          return false;
        };
      }
    </script>
    <script type="module" src="./main.js?v=20260403c"></script>
  </body>
</html>
