<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trimly | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css?v=20260402h" />
  </head>
  <body data-page="login">
    <header class="site-header">
      <div class="container nav-shell">
        <a class="brand" href="/">
          <span class="brand-badge">T</span>
          <span>Trimly</span>
        </a>
        <button class="nav-toggle" data-nav-toggle aria-label="Toggle menu">Menu</button>
        <nav class="nav-main" data-nav-menu>
          <div class="nav-links">
            <a href="/">Home</a>
            <a href="./barbers.html">Barbers</a>
          </div>
          <div class="auth-actions" data-auth-actions>
            <a class="btn btn-ghost" href="./login.html">Login</a>
            <a class="btn btn-primary" href="./register.html">Register</a>
            <a class="auth-admin-link" href="./admin-login.html">Admin Login</a>
          </div>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container form-shell">
        <div class="form-card">
          <h1 class="section-title">Login</h1>
          <p class="section-subtitle">Access your Trimly account.</p>

          <form
            id="loginForm"
            class="form-grid"
            method="post"
            onsubmit="event.preventDefault(); event.stopImmediatePropagation(); window.trimlyLoginInline?.(); return false;"
          >
            <div>
              <label for="email">Email</label>
              <input id="email" name="email" class="input" type="email" required />
            </div>
            <div>
              <label for="password">Password</label>
              <div class="input-with-action">
                <input id="password" name="password" class="input" type="password" required />
                <button
                  class="password-toggle"
                  type="button"
                  data-password-toggle="password"
                  onclick="return window.trimlyTogglePasswordInline?.('password', this);"
                  aria-label="Show password"
                >
                  Show
                </button>
              </div>
            </div>
            <button class="btn btn-primary" id="loginSubmitBtn" type="button" onclick="window.trimlyLoginInline?.();">Login</button>
          </form>

          <p id="authNotice" class="notice"></p>
          <p class="muted">No account yet? <a href="./register.html">Create one</a>.</p>
          <p class="muted"><a href="./reset-password.html">Forgot your password?</a></p>
          <p class="muted"><a href="./admin-login.html">Admin login</a></p>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-row">
        <span>&copy; <span data-current-year></span> Trimly</span>
        <div class="footer-links-inline"><a href="./acceptable-use.html">Acceptable Use</a><a href="./refund-cancellation-policy.html">Refund & Cancellation</a></div>
      </div>
    </footer>

    <div id="toast" class="toast"></div>
      <script>
        (function () {
          const API_BASE_URL = "https://api.trimly.com.ng";

          if (!window.trimlyTogglePasswordInline) {
            window.trimlyTogglePasswordInline = function (targetId, button) {
              const input = targetId ? document.getElementById(targetId) : null;
            if (!input || !button) return false;
            const nextType = input.type === "password" ? "text" : "password";
            input.type = nextType;
            button.dataset.visible = nextType !== "password" ? "true" : "false";
            button.setAttribute("aria-label", nextType === "password" ? "Show password" : "Hide password");
            button.setAttribute("title", nextType === "password" ? "Show password" : "Hide password");
            button.textContent = nextType === "password" ? "Show" : "Hide";
            return false;
          };
        }

        function scrubCredentialParams() {
          const url = new URL(window.location.href);
          const presetEmail = url.searchParams.get("email") || "";
          let changed = false;
          ["email", "password"].forEach(function (key) {
            if (url.searchParams.has(key)) {
              url.searchParams.delete(key);
              changed = true;
            }
          });
          if (changed) {
            history.replaceState({}, "", url.pathname + url.search + url.hash);
          }
          return presetEmail;
        }

        const presetEmail = scrubCredentialParams();
        document.addEventListener("DOMContentLoaded", function () {
          const form = document.getElementById("loginForm");
          if (form && form.email && presetEmail) {
            form.email.value = presetEmail;
          }
        });

        window.trimlyLoginInline = async function () {
          const form = document.getElementById("loginForm");
          const notice = document.getElementById("authNotice");
          const submitBtn = document.getElementById("loginSubmitBtn");
          if (!form || !notice || !submitBtn) return;

          const email = String(form.email?.value || "").trim();
          const password = String(form.password?.value || "");
          notice.textContent = "";
          notice.className = "notice";

          if (!email || !password) {
            notice.textContent = "Email and password are required.";
            notice.className = "notice error";
            return;
          }

          submitBtn.disabled = true;
          submitBtn.textContent = "Signing in...";

          try {
            const body = new URLSearchParams();
            body.append("username", email);
            body.append("password", password);

            const loginResponse = await fetch(`${API_BASE_URL}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body,
                credentials: "include",
              });

            const loginPayload = await loginResponse.json().catch(() => ({}));
            if (!loginResponse.ok) {
              throw new Error(loginPayload.detail || loginPayload.message || "Login failed");
            }

            localStorage.setItem("trimly_token", loginPayload.access_token || "");

            const meResponse = await fetch(`${API_BASE_URL}/me`, {
                headers: { Authorization: "Bearer " + (loginPayload.access_token || "") },
                credentials: "include",
              });
            const mePayload = await meResponse.json().catch(() => ({}));
            if (!meResponse.ok) {
              throw new Error(mePayload.detail || mePayload.message || "Unable to load account");
            }

            const role = String(mePayload.role || "").split(".").pop().toLowerCase();
            localStorage.setItem("trimly_role", role);
            localStorage.setItem("trimly_email", mePayload.logged_in_as || email);

            const urlParams = new URLSearchParams(window.location.search);
            const next =
              urlParams.get("next") ||
              (role === "barber" ? "/static/barber-dashboard.html" : "/static/dashboard.html");
            window.location.href = next;
          } catch (error) {
            notice.textContent = error.message || "Login failed";
            notice.className = "notice error";
          } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Login";
          }
        };
      })();
    </script>
    <script type="module" src="./main.js?v=20260411a"></script>
  </body>
</html>
