<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trimly | Chat Barber</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css?v=20260402h" />
  </head>
  <body data-page="messages">
    <header class="site-header">
      <div class="container nav-shell">
        <a class="brand" href="/">
          <span class="brand-badge">T</span>
          <span>Trimly</span>
        </a>
        <button class="nav-toggle" data-nav-toggle aria-label="Toggle menu">Menu</button>
        <nav class="nav-main" data-nav-menu>
          <div class="nav-links">
            <a href="/">Home</a>
            <a href="./dashboard.html">Dashboard</a>
          </div>
          <div class="auth-actions" data-auth-actions>
            <a class="btn btn-ghost" href="./login.html">Login</a>
            <a class="btn btn-primary" href="./register.html">Register</a>
            <a class="auth-admin-link" href="./admin-login.html">Admin Login</a>
          </div>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container chat-page-shell">
        <section class="chat-page-card">
          <div class="chat-page-head">
            <div>
              <p class="section-kicker">Approved Booking Chat</p>
              <h1 id="messagesHeading" class="section-title">Booking Chat</h1>
              <p id="messagesSubtitle" class="section-subtitle">
                Talk directly with your barber once the booking has been approved.
              </p>
            </div>
            <a class="btn btn-ghost" href="./dashboard.html">Back to Dashboard</a>
          </div>

          <div id="messagesList" class="chat-thread"></div>

          <form id="messageComposerForm" class="chat-composer">
            <input
              id="messageInput"
              class="input chat-composer-input"
              type="text"
              placeholder="Type your message here"
              autocomplete="off"
              required
            />
            <button class="btn btn-primary chat-send-btn" type="submit" aria-label="Send message">
              Send
            </button>
          </form>

          <p id="messageNotice" class="notice"></p>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-row">
        <span>&copy; <span data-current-year></span> Trimly</span>
        <span>Booking-based messaging for customers and barbers</span>
      </div>
    </footer>

    <div id="toast" class="toast"></div>
    <script type="module" src="./main.js?v=20260409a"></script>
  </body>
</html>
