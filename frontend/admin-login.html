<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trimly | Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css?v=20260402h" />
  </head>
  <body data-page="admin-login">
    <header class="site-header">
      <div class="container nav-shell">
        <a class="brand" href="./index.html">
          <span class="brand-badge">T</span>
          <span>Trimly</span>
        </a>
        <button class="nav-toggle" data-nav-toggle aria-label="Toggle menu">Menu</button>
        <nav class="nav-main" data-nav-menu>
          <div class="nav-links">
            <a href="./index.html">Home</a>
            <a href="./login.html">User Login</a>
          </div>
          <div class="auth-actions" data-auth-actions>
            <a class="btn btn-ghost" href="./login.html">Login</a>
            <a class="btn btn-primary" href="./register.html">Register</a>
            <a class="auth-admin-link" href="./admin-login.html">Admin Login</a>
          </div>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container form-shell">
        <div class="form-card admin-login-card">
          <span class="pill">Admin Access</span>
          <h1 class="section-title">Admin Login</h1>
          <p class="section-subtitle">
            Sign in with an administrator account to review KYC, disputes, refunds, and marketplace payout actions.
          </p>

          <form
            id="adminLoginForm"
            class="form-grid"
            method="post"
            onsubmit="event.preventDefault(); event.stopImmediatePropagation(); window.trimlyAdminLoginInline?.(); return false;"
          >
            <div>
              <label for="admin_email">Email</label>
              <input id="admin_email" name="email" class="input" type="email" required />
            </div>
            <div>
              <label for="admin_password">Password</label>
              <div class="input-with-action">
                <input id="admin_password" name="password" class="input" type="password" required />
                <button
                  class="password-toggle"
                  type="button"
                  data-password-toggle="admin_password"
                  onclick="return window.trimlyTogglePasswordInline?.('admin_password', this);"
                  aria-label="Show password"
                >
                  Show
                </button>
              </div>
            </div>
            <button class="btn btn-primary" id="adminLoginSubmitBtn" type="button" onclick="window.trimlyAdminLoginInline?.();">Login as Admin</button>
          </form>

          <p id="adminAuthNotice" class="notice"></p>
          <p class="muted">Customer or barber? <a href="./login.html">Use the standard login</a>.</p>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-row">
        <span>&copy; <span data-current-year></span> Trimly</span>
        <div class="footer-links-inline"><a href="./acceptable-use.html">Acceptable Use</a><a href="./refund-cancellation-policy.html">Refund & Cancellation</a></div>
      </div>
    </footer>

    <div id="toast" class="toast"></div>
    <script>
      (function () {
        if (!window.trimlyTogglePasswordInline) {
          window.trimlyTogglePasswordInline = function (targetId, button) {
            const input = targetId ? document.getElementById(targetId) : null;
            if (!input || !button) return false;
            const nextType = input.type === "password" ? "text" : "password";
            input.type = nextType;
            button.dataset.visible = nextType !== "password" ? "true" : "false";
            button.setAttribute("aria-label", nextType === "password" ? "Show password" : "Hide password");
            button.setAttribute("title", nextType === "password" ? "Show password" : "Hide password");
            button.textContent = nextType === "password" ? "Show" : "Hide";
            return false;
          };
        }

        function scrubCredentialParams() {
          const url = new URL(window.location.href);
          let changed = false;
          ["email", "password"].forEach(function (key) {
            if (url.searchParams.has(key)) {
              url.searchParams.delete(key);
              changed = true;
            }
          });
          if (changed) {
            history.replaceState({}, "", url.pathname + url.search + url.hash);
          }
        }

        window.trimlyAdminLoginInline = async function () {
          const form = document.getElementById("adminLoginForm");
          const notice = document.getElementById("adminAuthNotice");
          const submitBtn = document.getElementById("adminLoginSubmitBtn");
          if (!form || !notice || !submitBtn) return;

          const email = String(form.email?.value || "").trim();
          const password = String(form.password?.value || "");
          notice.textContent = "";
          notice.className = "notice";

          if (!email || !password) {
            notice.textContent = "Email and password are required.";
            notice.className = "notice error";
            return;
          }

          submitBtn.disabled = true;
          submitBtn.textContent = "Signing in...";

          try {
            const body = new URLSearchParams();
            body.append("username", email);
            body.append("password", password);

            const loginResponse = await fetch("/admin/session-login", {
              method: "POST",
              headers: { "Content-Type": "application/x-www-form-urlencoded" },
              body,
              credentials: "same-origin",
            });

            const loginPayload = await loginResponse.json().catch(() => ({}));
            if (!loginResponse.ok) {
              throw new Error(loginPayload.detail || loginPayload.message || "Admin login failed");
            }

            localStorage.setItem("trimly_token", loginPayload.access_token || "");

            const meResponse = await fetch("/me", {
              headers: { Authorization: "Bearer " + (loginPayload.access_token || "") },
            });
            const mePayload = await meResponse.json().catch(() => ({}));
            if (!meResponse.ok) {
              throw new Error(mePayload.detail || mePayload.message || "Unable to load admin account");
            }

            const role = String(mePayload.role || "").split(".").pop().toLowerCase();
            if (!["admin", "super_admin"].includes(role)) {
              localStorage.removeItem("trimly_token");
              throw new Error("This login is restricted to administrator accounts.");
            }

            localStorage.setItem("trimly_role", role);
            localStorage.setItem("trimly_email", mePayload.logged_in_as || email);
            window.location.href = "/admin";
          } catch (error) {
            notice.textContent = error.message || "Admin login failed";
            notice.className = "notice error";
          } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Login as Admin";
          }
        };

        scrubCredentialParams();
      })();
    </script>
    <script type="module" src="./main.js?v=20260403c"></script>
  </body>
</html>
