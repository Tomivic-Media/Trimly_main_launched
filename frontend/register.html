<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trimly | Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css?v=20260402h" />
  </head>
  <body data-page="register">
    <header class="site-header">
      <div class="container nav-shell">
        <a class="brand" href="/">
          <span class="brand-badge">T</span>
          <span>Trimly</span>
        </a>
        <button class="nav-toggle" data-nav-toggle aria-label="Toggle menu">Menu</button>
        <nav class="nav-main" data-nav-menu>
          <div class="nav-links">
            <a href="/">Home</a>
            <a href="./barbers.html">Barbers</a>
          </div>
          <div class="auth-actions" data-auth-actions>
            <a class="btn btn-ghost" href="./login.html">Login</a>
            <a class="btn btn-primary" href="./register.html">Register</a>
            <a class="auth-admin-link" href="./admin-login.html">Admin Login</a>
          </div>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container form-shell">
        <div class="form-card">
          <h1 class="section-title">Create Account</h1>
          <p class="section-subtitle">Join Trimly as a customer or barber.</p>

          <form id="registerForm" class="form-grid" method="post" onsubmit="event.preventDefault();">
            <div>
              <label for="full_name">Full Name</label>
              <input id="full_name" name="full_name" class="input" type="text" required />
            </div>

            <div>
              <label for="email">Email</label>
              <input id="email" name="email" class="input" type="email" required />
            </div>

            <div>
              <label for="phone">Phone (optional)</label>
              <input id="phone" name="phone" class="input" type="tel" />
            </div>

            <div>
              <label for="password">Password</label>
              <div class="input-with-action">
                <input id="password" name="password" class="input" type="password" required minlength="6" />
                <button
                  class="password-toggle"
                  type="button"
                  data-password-toggle="password"
                  onclick="return window.trimlyTogglePasswordInline?.('password', this);"
                  aria-label="Show password"
                >
                  Show
                </button>
              </div>
            </div>

            <div>
              <label for="role">Role</label>
              <select id="role" name="role" required>
                <option value="customer">Customer</option>
                <option value="barber">Barber</option>
              </select>
            </div>

            <div>
              <label for="referral_code">Referral Code (optional)</label>
              <input id="referral_code" name="referral_code" class="input" type="text" placeholder="Enter a Trimly referral code" />
            </div>

            <label class="checkbox-row">
              <input id="accepted_terms" name="accepted_terms" type="checkbox" required />
              <span>
                I accept Trimly's
                <a href="./acceptable-use.html" target="_blank" rel="noopener noreferrer">acceptable use policy</a>
                and
                <a href="./refund-cancellation-policy.html" target="_blank" rel="noopener noreferrer">marketplace refund & cancellation terms</a>.
              </span>
            </label>

            <button class="btn btn-primary" type="submit">Create account</button>
          </form>

          <p id="referralHint" class="notice"></p>
          <p id="authNotice" class="notice"></p>
          <p class="muted">Already have an account? <a href="./login.html">Login</a>.</p>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-row">
        <span>&copy; <span data-current-year></span> Trimly</span>
        <div class="footer-links-inline"><a href="./acceptable-use.html">Acceptable Use</a><a href="./refund-cancellation-policy.html">Refund & Cancellation</a></div>
      </div>
    </footer>

    <div id="toast" class="toast"></div>
    <script>
      if (!window.trimlyTogglePasswordInline) {
        window.trimlyTogglePasswordInline = function (targetId, button) {
          const input = targetId ? document.getElementById(targetId) : null;
          if (!input || !button) return false;
          const nextType = input.type === "password" ? "text" : "password";
          input.type = nextType;
          button.dataset.visible = nextType !== "password" ? "true" : "false";
          button.setAttribute("aria-label", nextType === "password" ? "Show password" : "Hide password");
          button.setAttribute("title", nextType === "password" ? "Show password" : "Hide password");
          button.textContent = nextType === "password" ? "Show" : "Hide";
          return false;
        };
      }
    </script>
    <script type="module" src="./main.js?v=20260409a"></script>
  </body>
</html>
